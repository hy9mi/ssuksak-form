<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쓱싹 전문가 파트너 상담 신청</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f6f8; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem 4rem; }
    .form-wrap { max-width: 620px; margin: 0 auto; }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
    .brand-icon { width: 44px; height: 44px; background: #0f7be8; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .brand-icon svg { width: 24px; height: 24px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .brand-title { font-size: 20px; font-weight: 700; color: #1a1a1a; }
    .brand-sub { font-size: 12px; color: #888; margin-top: 2px; }
    .intro-card { background: #e8f3fd; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 2rem; border: 1px solid #b5d4f4; }
    .intro-card p { font-size: 13px; color: #185fa5; line-height: 1.7; }
    .card { background: white; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .section-label { font-size: 11px; font-weight: 600; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.25rem; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
    .field { margin-bottom: 1.1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 13px; font-weight: 600; color: #333; display: block; margin-bottom: 6px; }
    .field label .req { color: #e24b4a; margin-left: 2px; }
    .field input, .field select, .field textarea {
      width: 100%; font-family: inherit; font-size: 14px; padding: 10px 13px;
      border: 1.5px solid #e8e8e8; border-radius: 10px; background: #fafafa;
      color: #1a1a1a; outline: none; transition: border-color 0.15s, background 0.15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: #0f7be8; background: white; }
    .field input.error, .field select.error { border-color: #e24b4a; }
    .field textarea { resize: vertical; min-height: 90px; }
    .field .hint { font-size: 11px; color: #aaa; margin-top: 5px; line-height: 1.5; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .row2 { grid-template-columns: 1fr; } }
    .region-label { font-size: 13px; font-weight: 600; color: #333; display: block; margin-bottom: 10px; }
    .region-label .req { color: #e24b4a; margin-left: 2px; }
    .sido-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .sido-tab {
      font-size: 12px; padding: 6px 13px; border-radius: 20px;
      border: 1.5px solid #e8e8e8; background: white; color: #666;
      cursor: pointer; transition: all 0.15s; font-family: inherit; font-weight: 500;
    }
    .sido-tab:hover { border-color: #0f7be8; color: #0f7be8; }
    .sido-tab.active { background: #0f7be8; border-color: #0f7be8; color: white; }
    .sigungu-wrap { background: #fafafa; border: 1.5px solid #e8e8e8; border-radius: 12px; padding: 12px; min-height: 52px; }
    .sigungu-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .sigungu-chip {
      font-size: 12px; padding: 5px 11px; border-radius: 8px;
      border: 1.5px solid #e8e8e8; background: white; color: #555;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
      display: flex; align-items: center; gap: 4px;
    }
    .sigungu-chip:hover { border-color: #0f7be8; color: #0f7be8; }
    .sigungu-chip.selected { background: #e8f3fd; border-color: #0f7be8; color: #185fa5; font-weight: 500; }
    .sigungu-empty { font-size: 13px; color: #bbb; }
    .selected-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; min-height: 10px; }
    .tag {
      font-size: 12px; padding: 5px 10px; background: #e8f3fd;
      border: 1px solid #b5d4f4; border-radius: 20px; color: #185fa5;
      display: flex; align-items: center; gap: 5px;
    }
    .tag button { background: none; border: none; cursor: pointer; color: #378add; font-size: 15px; padding: 0; line-height: 1; display: flex; align-items: center; }
    .submit-btn {
      width: 100%; padding: 15px; background: #0f7be8; color: white;
      border: none; border-radius: 14px; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 1.5rem; font-family: inherit;
      transition: background 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover { background: #0d6fd0; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { background: #aaa; cursor: not-allowed; }
    .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 2rem; text-align: center; }
    .success-icon { width: 64px; height: 64px; background: #eaf3de; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
    .success-icon svg { width: 32px; height: 32px; stroke: #3b6d11; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .success-title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: #888; line-height: 1.7; }
  </style>
</head>
<body>

<div class="form-wrap" id="formView">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M9.5 14.5s1 1 2.5 1 2.5-1 2.5-1"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 10h.01M16 10h.01"/></svg>
    </div>
    <div>
      <div class="brand-title">쓱싹</div>
      <div class="brand-sub">정직한 홈케어의 기준</div>
    </div>
  </div>

  <div class="intro-card">
    <p>유선으로 안내드린 양식입니다.<br>정확한 정보를 입력해주시면 담당자가 검토 후 연락드리겠습니다.</p>
  </div>

  <div class="card">
    <div class="section-label">사업자 정보</div>
    <div class="field">
      <label>사업자 구분 <span class="req">*</span></label>
      <select id="bizType">
        <option value="">선택해주세요</option>
        <option>개인</option>
        <option>간이</option>
        <option>법인</option>
      </select>
    </div>
    <div class="field">
      <label>상호명 <span class="req">*</span></label>
      <input type="text" id="bizName" placeholder="사업체 상호명을 입력해주세요" />
    </div>
    <div class="field">
      <label>사업지 주소 <span class="req">*</span></label>
      <input type="text" id="bizAddr" placeholder="예) 서울시 강남구 테헤란로 123" />
    </div>
    <div class="row2">
      <div class="field">
        <label>사업자 등록 대표자 성함 <span class="req">*</span></label>
        <input type="text" id="ownerName" placeholder="대표자 성함" />
      </div>
      <div class="field">
        <label>사업자 등록번호 <span class="req">*</span></label>
        <input type="text" id="bizNo" placeholder="000-00-00000" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">전문가 정보</div>
    <div class="row2">
      <div class="field">
        <label>신청 전문가님 직함 <span class="req">*</span></label>
        <input type="text" id="jobTitle" placeholder="예) 대표, 팀장, 기사" />
      </div>
      <div class="field">
        <label>대표님 연락처 <span class="req">*</span></label>
        <input type="tel" id="phone" placeholder="010-0000-0000" />
      </div>
    </div>
    <div class="field">
      <label>활동 전문가님 인원수 <span class="req">*</span></label>
      <input type="number" id="headcount" placeholder="팀 전체 인원수" min="1" />
      <p class="hint">팀으로 움직이실 예정이시면 모든 인원을 포함한 숫자를 적어주세요.</p>
    </div>
  </div>

  <div class="card">
    <div class="section-label">활동 지역</div>
    <label class="region-label">관할 지역 <span class="req">*</span></label>
    <div class="sido-tabs" id="sidoTabs"></div>
    <div class="sigungu-wrap">
      <div class="sigungu-grid" id="sigunguGrid">
        <span class="sigungu-empty">위에서 시/도를 선택해주세요</span>
      </div>
    </div>
    <div class="selected-tags" id="selectedTags"></div>
  </div>

  <div class="card">
    <div class="section-label">서비스 정보</div>
    <div class="field">
      <label>불가능한 에어컨 품목</label>
      <textarea id="unavailable" placeholder="예) 삼성 미켈란젤로 불가, LG 오브제 불가, 에어컨 분해 불가&#10;또는 스탠드만 가능 등 자유롭게 입력해주세요"></textarea>
      <p class="hint">없으시면 비워두셔도 됩니다.</p>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    상담 신청하기
  </button>
</div>

<div class="success-screen" id="successView">
  <div class="success-icon">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="success-title">신청이 완료되었습니다!</div>
  <div class="success-sub">담당자가 내용을 검토한 후<br>입력하신 연락처로 연락드리겠습니다.</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSK7CG6MhS6ZI9Gwd0X6GngLU98OfOF48CZHjmNiyfZFAlz-bWO7zsMMMNSvNORrWU/exec";

const regionData = {
  "서울": ["강남구","강동구","강북구","강서구","관악구","광진구","구로구","금천구","노원구","도봉구","동대문구","동작구","마포구","서대문구","서초구","성동구","성북구","송파구","양천구","영등포구","용산구","은평구","종로구","중구","중랑구"],
  "경기": ["수원시","성남시","의정부시","안양시","부천시","광명시","평택시","동두천시","안산시","고양시","과천시","구리시","남양주시","오산시","시흥시","군포시","의왕시","하남시","용인시","파주시","이천시","안성시","김포시","화성시","광주시","양주시","포천시","여주시","연천군","가평군","양평군"],
  "인천": ["계양구","남동구","동구","미추홀구","부평구","서구","연수구","중구","강화군","옹진군"],
  "부산": ["강서구","금정구","기장군","남구","동구","동래구","부산진구","북구","사상구","사하구","서구","수영구","연제구","영도구","중구","해운대구"],
  "대구": ["남구","달서구","달성군","동구","북구","서구","수성구","중구"],
  "대전": ["대덕구","동구","서구","유성구","중구"],
  "광주": ["광산구","남구","동구","북구","서구"],
  "울산": ["남구","동구","북구","울주군","중구"],
  "세종": ["세종시"],
  "경남": ["거제시","거창군","고성군","김해시","남해군","밀양시","사천시","산청군","양산시","의령군","진주시","창녕군","창원시","통영시","하동군","함안군","함양군","합천군"],
  "경북": ["경산시","경주시","고령군","구미시","군위군","김천시","문경시","봉화군","상주시","성주군","안동시","영덕군","영양군","영주시","영천시","예천군","울릉군","울진군","의성군","청도군","청송군","칠곡군","포항시"],
  "전남": ["강진군","고흥군","곡성군","광양시","구례군","나주시","담양군","목포시","무안군","보성군","순천시","신안군","여수시","영광군","영암군","완도군","장성군","장흥군","진도군","함평군","해남군","화순군"],
  "전북": ["고창군","군산시","김제시","남원시","무주군","부안군","순창군","완주군","익산시","임실군","장수군","전주시","정읍시","진안군"],
  "충남": ["계룡시","공주시","금산군","논산시","당진시","보령시","부여군","서산시","서천군","아산시","예산군","천안시","청양군","태안군","홍성군"],
  "충북": ["괴산군","단양군","보은군","영동군","옥천군","음성군","제천시","증평군","진천군","청주시","충주시"],
  "강원": ["강릉시","고성군","동해시","삼척시","속초시","양구군","양양군","영월군","원주시","인제군","정선군","철원군","춘천시","태백시","평창군","홍천군","화천군","횡성군"],
  "제주": ["서귀포시","제주시"]
};

let selectedRegions = [], activeSido = null;
const sidoTabsEl = document.getElementById('sidoTabs');
const sigunguGrid = document.getElementById('sigunguGrid');
const selectedTagsEl = document.getElementById('selectedTags');

Object.keys(regionData).forEach(sido => {
  const btn = document.createElement('button');
  btn.className = 'sido-tab';
  btn.textContent = sido;
  btn.type = 'button';
  btn.onclick = () => selectSido(sido, btn);
  sidoTabsEl.appendChild(btn);
});

function selectSido(sido, btn) {
  document.querySelectorAll('.sido-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeSido = sido;
  renderSigungu(sido);
}

function renderSigungu(sido) {
  sigunguGrid.innerHTML = '';
  regionData[sido].forEach(gu => {
    const key = sido + ' ' + gu;
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'sigungu-chip' + (selectedRegions.includes(key) ? ' selected' : '');
    chip.textContent = gu;
    if (selectedRegions.includes(key)) {
      chip.innerHTML = '✓ ' + gu;
    }
    chip.onclick = () => toggleRegion(key, sido);
    sigunguGrid.appendChild(chip);
  });
}

function toggleRegion(key, sido) {
  const idx = selectedRegions.indexOf(key);
  if (idx > -1) selectedRegions.splice(idx, 1);
  else selectedRegions.push(key);
  renderSigungu(sido);
  renderTags();
}

function renderTags() {
  selectedTagsEl.innerHTML = '';
  selectedRegions.forEach(key => {
    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.innerHTML = key + '<button type="button" onclick="removeTag(\'' + key + '\')" aria-label="' + key + ' 삭제">×</button>';
    selectedTagsEl.appendChild(tag);
  });
}

function removeTag(key) {
  selectedRegions = selectedRegions.filter(r => r !== key);
  if (activeSido) renderSigungu(activeSido);
  renderTags();
}

async function handleSubmit() {
  const fields = ['bizType','bizName','bizAddr','ownerName','bizNo','jobTitle','phone','headcount'];
  let valid = true;
  fields.forEach(id => {
    const el = document.getElementById(id);
    if (!el.value.trim()) { el.classList.add('error'); valid = false; }
    else el.classList.remove('error');
  });
  if (selectedRegions.length === 0) {
    alert('관할 지역을 1개 이상 선택해주세요.');
    valid = false;
  }
  if (!valid) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> 전송 중...';

  const payload = {
    bizType: document.getElementById('bizType').value,
    bizName: document.getElementById('bizName').value,
    bizAddr: document.getElementById('bizAddr').value,
    ownerName: document.getElementById('ownerName').value,
    bizNo: document.getElementById('bizNo').value,
    title: document.getElementById('jobTitle').value,
    phone: document.getElementById('phone').value,
    headcount: document.getElementById('headcount').value,
    regions: selectedRegions.join(', '),
    unavailable: document.getElementById('unavailable').value
  };

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    document.getElementById('formView').style.display = 'none';
    const sv = document.getElementById('successView');
    sv.style.display = 'flex';
  } catch(err) {
    alert('전송 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    btn.disabled = false;
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> 상담 신청하기';
  }
}
</script>
</body>
</html>
